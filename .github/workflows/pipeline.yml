name: Validate Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --reinstall ca-certificates
          sudo apt-get install -y bwa samtools bcftools fastqc fastp bc

      - name: Install Python packages
        run: pip install matplotlib pandas --break-system-packages

      - name: Get data
        run: bash scripts/01_get_data.sh

      - name: QC and trim
        run: bash scripts/02_qc_trim.sh

      - name: Align
        run: bash scripts/03_align.sh

      - name: Call variants
        run: bash scripts/04_call_variants.sh

      - name: Validate against ground truth
        run: bash scripts/06_validate.sh

      - name: Generate summary plot
        run: python3 scripts/05_summary_plot.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: results/variant_summary.png
